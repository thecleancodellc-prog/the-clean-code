<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Clean Code — Factory Control Panel</title>
  <style>
    :root {
      --bg: #060d09;
      --surface: #0d1f14;
      --border: #1a3a22;
      --green: #34d399;
      --green-dim: #1a6644;
      --green-bright: #6ee7b7;
      --amber: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --text: #d1fae5;
      --text-dim: #6b9e80;
      --font: "Courier New", Courier, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; min-height: 100vh; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    header h1 { font-size: 15px; color: var(--green); letter-spacing: 2px; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .pulse-dot {
      width: 9px; height: 9px; border-radius: 50%; background: var(--green-dim);
      display: inline-block; margin-right: 6px;
      transition: background 0.3s;
    }
    .pulse-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-label { font-size: 11px; color: var(--text-dim); }
    .last-update { font-size: 11px; color: var(--text-dim); }

    /* ── Layout ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 1px;
      background: var(--border);
      height: calc(100vh - 49px);
    }
    .panel {
      background: var(--bg);
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    /* ── Stats bar ── */
    .stats-bar {
      grid-column: 1 / -1;
      display: flex;
      gap: 1px;
      background: var(--border);
    }
    .stat {
      flex: 1;
      background: var(--surface);
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-value { font-size: 28px; color: var(--green); font-weight: bold; }
    .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    .stat-sub { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Agents grid ── */
    .agents-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      overflow-y: auto;
    }
    .agent-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.3s, background 0.3s;
      background: var(--surface);
    }
    .agent-card.running  { border-color: var(--green); background: #0a1f12; }
    .agent-card.complete { border-color: var(--green-dim); }
    .agent-card.error    { border-color: var(--red); background: #1a0a0a; }
    .agent-card.skipped  { opacity: 0.4; }

    .agent-header { display: flex; align-items: center; justify-content: space-between; }
    .agent-name { font-size: 12px; color: var(--green-bright); font-weight: bold; }
    .agent-badge {
      font-size: 9px; padding: 2px 6px; border-radius: 2px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .badge-idle     { background: #1a2520; color: var(--text-dim); }
    .badge-running  { background: #0f3020; color: var(--green); animation: pulse 1s infinite; }
    .badge-complete { background: #0a2515; color: var(--green); }
    .badge-error    { background: #2a0f0f; color: var(--red); }
    .badge-skipped  { background: #1a1a1a; color: #555; }

    .agent-msg { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-time { font-size: 9px; color: #3a5a48; }

    /* ── Posts panel ── */
    .posts-list { overflow-y: auto; flex: 1; }
    .post-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .post-title { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .post-date { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
    .post-featured { font-size: 9px; color: var(--amber); margin-left: 4px; }

    /* ── Activity feed ── */
    .feed { overflow-y: auto; flex: 1; }
    .feed-entry {
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .feed-time { font-size: 10px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }
    .feed-msg { font-size: 11px; color: var(--text); }
    .feed-msg.success { color: var(--green); }
    .feed-msg.fail    { color: var(--red); }
    .feed-msg.start   { color: var(--amber); }

    /* ── Current agent banner ── */
    .current-banner {
      background: var(--surface);
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--green);
      display: none;
    }
    .current-banner.visible { display: block; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>⬡ The Clean Code — Factory Control Panel</h1>
  <div class="header-right">
    <span id="running-indicator">
      <span class="pulse-dot" id="pulse"></span>
      <span class="status-label" id="run-status">IDLE</span>
    </span>
    <span class="last-update" id="last-update">—</span>
  </div>
</header>

<div class="grid">

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-posts">—</div>
      <div class="stat-label">Posts Published</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-social">—</div>
      <div class="stat-label">Social Caption Sets</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-reels">—</div>
      <div class="stat-label">Reel Scripts</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-emails">—</div>
      <div class="stat-label">Email Drafts</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-images">—</div>
      <div class="stat-label">Cover Images</div>
    </div>
    <div class="stat" style="flex:2">
      <div class="stat-sub" id="stat-last-post">Last post: —</div>
      <div class="stat-sub" id="stat-last-run">Last run: —</div>
    </div>
  </div>

  <!-- Agents panel -->
  <div class="panel">
    <div class="panel-title">Agent Pipeline</div>
    <div class="current-banner" id="current-banner">
      ▶ Running: <strong id="current-agent-name">—</strong> <span class="blink">█</span>
    </div>
    <div class="agents-grid" id="agents-grid">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Posts panel -->
  <div class="panel">
    <div class="panel-title">Published Posts (<span id="post-count">0</span>)</div>
    <div class="posts-list" id="posts-list">
      <div style="color:var(--text-dim);font-size:11px;">Loading...</div>
    </div>
  </div>

  <!-- Activity feed -->
  <div class="panel">
    <div class="panel-title">Activity Feed</div>
    <div class="feed" id="feed">
      <div style="color:var(--text-dim);font-size:11px;">Waiting for activity...</div>
    </div>
  </div>

</div>

<script>
  const AGENTS = ["Scout","Amazon","Scribe","Image","Publisher","Spark","Reel","Mailer"];
  const AGENT_DESC = {
    Scout: "Research & pick topic",
    Amazon: "Find affiliate product",
    Scribe: "Write full post",
    Image: "Generate cover image",
    Publisher: "Publish to posts.js",
    Spark: "Write social captions",
    Reel: "Write video script",
    Mailer: "Draft newsletter",
  };

  function formatTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleTimeString("en-US", { hour12: false });
  }

  function formatDateTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function renderAgents(agents) {
    const grid = document.getElementById("agents-grid");
    grid.innerHTML = AGENTS.map(name => {
      const a = agents[name] ?? { status: "idle", lastMessage: "", updatedAt: null };
      return `
        <div class="agent-card ${a.status}">
          <div class="agent-header">
            <span class="agent-name">${name}</span>
            <span class="agent-badge badge-${a.status}">${a.status}</span>
          </div>
          <div class="agent-msg">${a.lastMessage || AGENT_DESC[name]}</div>
          <div class="agent-time">${a.updatedAt ? formatTime(a.updatedAt) : ""}</div>
        </div>`;
    }).join("");
  }

  function renderFeed(feed) {
    const el = document.getElementById("feed");
    if (!feed || feed.length === 0) {
      el.innerHTML = `<div style="color:var(--text-dim);font-size:11px;">No activity yet.</div>`;
      return;
    }
    el.innerHTML = feed.map(entry => {
      const cls = entry.message.includes("✓") ? "success"
                : entry.message.includes("✗") ? "fail"
                : entry.message.toLowerCase().includes("started") ? "start" : "";
      return `<div class="feed-entry">
        <span class="feed-time">${formatTime(entry.time)}</span>
        <span class="feed-msg ${cls}">${entry.message}</span>
      </div>`;
    }).join("");
  }

  function renderPosts(data) {
    document.getElementById("post-count").textContent = data.count;
    document.getElementById("stat-posts").textContent = data.count;
    document.getElementById("stat-social").textContent = data.outputs.social;
    document.getElementById("stat-reels").textContent = data.outputs.reels;
    document.getElementById("stat-emails").textContent = data.outputs.emails;
    document.getElementById("stat-images").textContent = data.outputs.images;

    const list = document.getElementById("posts-list");
    list.innerHTML = [...data.posts].reverse().map(p => `
      <div class="post-row">
        <span class="post-title">${p.title}${p.featured ? '<span class="post-featured">★</span>' : ""}</span>
        <span class="post-date">${p.date}</span>
      </div>`).join("");
  }

  async function refresh() {
    try {
      const [statusRes, postsRes] = await Promise.all([
        fetch("/api/status"),
        fetch("/api/posts"),
      ]);
      const status = await statusRes.json();
      const posts  = await postsRes.json();

      // Header
      const pulse = document.getElementById("pulse");
      const runStatus = document.getElementById("run-status");
      pulse.classList.toggle("active", status.isRunning);
      runStatus.textContent = status.isRunning ? "RUNNING" : "IDLE";
      document.getElementById("last-update").textContent =
        status.lastUpdate ? `Updated ${formatTime(status.lastUpdate)}` : "—";

      // Current agent banner
      const banner = document.getElementById("current-banner");
      if (status.isRunning && status.currentAgent) {
        banner.classList.add("visible");
        document.getElementById("current-agent-name").textContent = status.currentAgent;
      } else {
        banner.classList.remove("visible");
      }

      // Stats
      document.getElementById("stat-last-post").textContent =
        status.stats.lastPostTitle ? `Last post: ${status.stats.lastPostTitle}` : "Last post: —";
      document.getElementById("stat-last-run").textContent =
        status.lastRunDate ? `Last run: ${formatDateTime(status.lastRunDate)}` : "Last run: —";

      renderAgents(status.agents);
      renderFeed(status.activityFeed);
      renderPosts(posts);

    } catch (e) {
      console.warn("Fetch error:", e.message);
    }
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
