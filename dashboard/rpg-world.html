<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Clean Code — Guild Hall</title>
  <style>
    :root {
      --bg: #0e0a06;
      --surface: #1a1208;
      --border: #3d2a0e;
      --gold: #f59e0b;
      --gold-bright: #fcd34d;
      --gold-dim: #78450a;
      --green: #34d399;
      --red: #ef4444;
      --parchment: #e8d5a3;
      --parchment-dim: #a08040;
      --purple: #a78bfa;
      --font-serif: Georgia, "Times New Roman", serif;
      --font-mono: "Courier New", Courier, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--parchment); font-family: var(--font-serif); font-size: 13px; min-height: 100vh; }

    /* ── Parchment texture overlay ── */
    body::before {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,200,80,0.015) 29px);
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 1;
      background: var(--surface);
      border-bottom: 2px solid var(--gold-dim);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      text-align: center;
    }
    header h1 { font-size: 18px; color: var(--gold-bright); letter-spacing: 3px; text-transform: uppercase; font-style: italic; }
    header h1 span { color: var(--green); }
    .header-right { font-size: 11px; color: var(--parchment-dim); font-family: var(--font-mono); text-align: right; }
    .realm-status { font-size: 12px; color: var(--gold); }
    .realm-status.active { color: var(--green); animation: glow 2s infinite; }
    @keyframes glow { 0%,100%{text-shadow:0 0 4px var(--green)} 50%{text-shadow:0 0 12px var(--green)} }

    /* ── Layout ── */
    .realm {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 300px;
      grid-template-rows: auto 1fr;
      gap: 1px;
      background: var(--border);
      height: calc(100vh - 53px);
    }

    .scroll {
      background: var(--bg);
      padding: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .scroll-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-dim);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      margin-bottom: 12px;
      font-family: var(--font-mono);
    }

    /* ── Crown stats bar ── */
    .crown-bar {
      grid-column: 1 / -1;
      display: flex;
      gap: 1px;
      background: var(--border);
    }
    .crown-stat {
      flex: 1;
      background: var(--surface);
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      border-top: 2px solid var(--gold-dim);
    }
    .crown-stat:first-child { border-top-color: var(--gold); }
    .crown-value { font-size: 26px; color: var(--gold-bright); font-weight: bold; }
    .crown-label { font-size: 9px; color: var(--parchment-dim); letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-mono); }
    .crown-sub { font-size: 10px; color: var(--parchment-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); }

    /* ── Guild members (agents) ── */
    .guild-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      overflow-y: auto;
    }
    .member {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      background: var(--surface);
      transition: border-color 0.3s, background 0.3s;
    }
    .member.on-quest  { border-color: var(--gold); background: #1c1405; }
    .member.returned  { border-color: var(--gold-dim); }
    .member.fallen    { border-color: var(--red); background: #1a0a0a; }
    .member.resting   { opacity: 0.5; }

    .member-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .member-name { font-size: 13px; color: var(--gold-bright); font-style: italic; }
    .member-class { font-size: 9px; color: var(--parchment-dim); font-family: var(--font-mono); }
    .member-rune {
      font-size: 9px; padding: 2px 6px; border-radius: 2px;
      text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono);
    }
    .rune-idle     { background: #1a1208; color: var(--parchment-dim); }
    .rune-running  { background: #1c1405; color: var(--gold); animation: pulse 1s infinite; }
    .rune-complete { background: #0a1a0a; color: var(--green); }
    .rune-error    { background: #1a0808; color: var(--red); }
    .rune-skipped  { background: #111; color: #555; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .member-lore { font-size: 10px; color: var(--parchment-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); }

    /* XP bar */
    .xp-track { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; }
    .xp-fill  { height: 100%; border-radius: 2px; background: var(--gold-dim); transition: width 0.5s; }
    .xp-fill.done { background: var(--green); }
    .xp-fill.quest { background: var(--gold); }
    .xp-fill.fail  { background: var(--red); }

    /* ── Tome of Posts ── */
    .tome { overflow-y: auto; flex: 1; }
    .tome-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border); gap: 8px;
    }
    .tome-title { font-size: 11px; color: var(--parchment); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-style: italic; }
    .tome-date  { font-size: 10px; color: var(--parchment-dim); white-space: nowrap; font-family: var(--font-mono); }
    .tome-star  { color: var(--gold); font-size: 11px; }

    /* ── Quest Log ── */
    .log { overflow-y: auto; flex: 1; }
    .log-entry {
      padding: 5px 0; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .log-time { font-size: 10px; color: var(--parchment-dim); white-space: nowrap; flex-shrink: 0; font-family: var(--font-mono); }
    .log-text { font-size: 11px; color: var(--parchment); font-style: italic; }
    .log-text.victory { color: var(--green); }
    .log-text.defeat  { color: var(--red); }
    .log-text.herald  { color: var(--gold); }

    /* ── Active quest banner ── */
    .quest-banner {
      background: #1c1405;
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 11px;
      color: var(--gold);
      display: none;
      font-family: var(--font-mono);
    }
    .quest-banner.visible { display: block; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div style="font-size:11px;color:var(--parchment-dim);font-family:var(--font-mono);" id="realm-date">—</div>
  <h1>⚔ The Clean Code — <span>Guild Hall</span></h1>
  <div class="header-right">
    <div class="realm-status" id="realm-status">⬡ Realm at Peace</div>
    <div id="realm-update" style="margin-top:3px;">—</div>
  </div>
</header>

<div class="realm">

  <!-- Crown stats -->
  <div class="crown-bar">
    <div class="crown-stat">
      <div class="crown-value" id="c-posts">—</div>
      <div class="crown-label">Scrolls Published</div>
    </div>
    <div class="crown-stat">
      <div class="crown-value" id="c-social">—</div>
      <div class="crown-label">Town Crier Decrees</div>
    </div>
    <div class="crown-stat">
      <div class="crown-value" id="c-reels">—</div>
      <div class="crown-label">Bard's Tales</div>
    </div>
    <div class="crown-stat">
      <div class="crown-value" id="c-emails">—</div>
      <div class="crown-label">Royal Dispatches</div>
    </div>
    <div class="crown-stat">
      <div class="crown-value" id="c-images">—</div>
      <div class="crown-label">Illuminations</div>
    </div>
    <div class="crown-stat" style="flex:2">
      <div class="crown-sub" id="c-last-scroll">Last scroll: —</div>
      <div class="crown-sub" id="c-last-quest">Last quest: —</div>
    </div>
  </div>

  <!-- Guild members -->
  <div class="scroll">
    <div class="scroll-title">Guild Members</div>
    <div class="quest-banner" id="quest-banner">
      ⚔ On Quest: <strong id="quest-agent">—</strong> <span class="blink">▌</span>
    </div>
    <div class="guild-grid" id="guild-grid">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Tome of posts -->
  <div class="scroll">
    <div class="scroll-title">Tome of Scrolls (<span id="tome-count">0</span>)</div>
    <div class="tome" id="tome-list">
      <div style="color:var(--parchment-dim);font-size:11px;font-style:italic;">The tome is empty...</div>
    </div>
  </div>

  <!-- Quest log -->
  <div class="scroll">
    <div class="scroll-title">Quest Log</div>
    <div class="log" id="quest-log">
      <div style="color:var(--parchment-dim);font-size:11px;font-style:italic;">Awaiting word from the field...</div>
    </div>
  </div>

</div>

<script>
  const GUILD = {
    Scout:     { title: "Ranger",       role: "Tracks & identifies worthy topics" },
    Amazon:    { title: "Merchant",     role: "Sources enchanted artifacts" },
    Scribe:    { title: "Lore Keeper",  role: "Chronicles the sacred words" },
    Image:     { title: "Illuminator",  role: "Paints visions of the realm" },
    Publisher: { title: "Herald",       role: "Delivers scrolls to the kingdom" },
    Spark:     { title: "Town Crier",   role: "Proclaims news to the masses" },
    Reel:      { title: "Bard",         role: "Composes tales for the stage" },
    Mailer:    { title: "Dispatch Rider", role: "Carries royal correspondence" },
  };

  const XP_BY_STATUS = { idle: 0, running: 50, complete: 100, error: 20, skipped: 0 };

  function formatTime(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleTimeString("en-US", { hour12: false });
  }

  function formatDateTime(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function statusToQuest(s) {
    return { idle: "resting", running: "on-quest", complete: "returned", error: "fallen", skipped: "resting" }[s] ?? "resting";
  }

  function renderGuild(agents) {
    const grid = document.getElementById("guild-grid");
    grid.innerHTML = Object.keys(GUILD).map(name => {
      const a = agents[name] ?? { status: "idle", lastMessage: "", updatedAt: null };
      const g = GUILD[name];
      const questClass = statusToQuest(a.status);
      const xp = XP_BY_STATUS[a.status] ?? 0;
      const fillClass = a.status === "complete" ? "done" : a.status === "running" ? "quest" : a.status === "error" ? "fail" : "";
      return `
        <div class="member ${questClass}">
          <div class="member-top">
            <div>
              <div class="member-name">${name}</div>
              <div class="member-class">${g.title}</div>
            </div>
            <span class="member-rune rune-${a.status}">${a.status}</span>
          </div>
          <div class="member-lore">${a.lastMessage || g.role}</div>
          <div class="xp-track"><div class="xp-fill ${fillClass}" style="width:${xp}%"></div></div>
        </div>`;
    }).join("");
  }

  function renderQuestLog(feed) {
    const el = document.getElementById("quest-log");
    if (!feed || feed.length === 0) {
      el.innerHTML = `<div style="color:var(--parchment-dim);font-size:11px;font-style:italic;">Awaiting word from the field...</div>`;
      return;
    }
    el.innerHTML = feed.map(entry => {
      const cls = entry.message.includes("✓") ? "victory"
                : entry.message.includes("✗") ? "defeat"
                : entry.message.toLowerCase().includes("started") || entry.message.toLowerCase().includes("complete") ? "herald" : "";
      return `<div class="log-entry">
        <span class="log-time">${formatTime(entry.time)}</span>
        <span class="log-text ${cls}">${entry.message}</span>
      </div>`;
    }).join("");
  }

  function renderTome(data) {
    document.getElementById("tome-count").textContent = data.count;
    document.getElementById("c-posts").textContent  = data.count;
    document.getElementById("c-social").textContent = data.outputs.social;
    document.getElementById("c-reels").textContent  = data.outputs.reels;
    document.getElementById("c-emails").textContent = data.outputs.emails;
    document.getElementById("c-images").textContent = data.outputs.images;

    const list = document.getElementById("tome-list");
    list.innerHTML = [...data.posts].reverse().map(p => `
      <div class="tome-row">
        <span class="tome-title">${p.featured ? '<span class="tome-star">★ </span>' : ""}${p.title}</span>
        <span class="tome-date">${p.date}</span>
      </div>`).join("");
  }

  async function refresh() {
    try {
      const [statusRes, postsRes] = await Promise.all([
        fetch("/api/status"),
        fetch("/api/posts"),
      ]);
      const status = await statusRes.json();
      const posts  = await postsRes.json();

      // Header
      document.getElementById("realm-date").textContent = new Date().toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
      const realmEl = document.getElementById("realm-status");
      if (status.isRunning) {
        realmEl.textContent = "⚔ Realm Active — Quest Underway";
        realmEl.className = "realm-status active";
      } else {
        realmEl.textContent = "⬡ Realm at Peace";
        realmEl.className = "realm-status";
      }
      document.getElementById("realm-update").textContent =
        status.lastUpdate ? `Updated ${formatTime(status.lastUpdate)}` : "—";

      // Quest banner
      const banner = document.getElementById("quest-banner");
      if (status.isRunning && status.currentAgent) {
        banner.classList.add("visible");
        document.getElementById("quest-agent").textContent =
          `${status.currentAgent} (${GUILD[status.currentAgent]?.title ?? ""})`;
      } else {
        banner.classList.remove("visible");
      }

      // Crown stats
      document.getElementById("c-last-scroll").textContent =
        status.stats.lastPostTitle ? `Last scroll: "${status.stats.lastPostTitle}"` : "Last scroll: —";
      document.getElementById("c-last-quest").textContent =
        status.lastRunDate ? `Last quest: ${formatDateTime(status.lastRunDate)}` : "Last quest: —";

      renderGuild(status.agents);
      renderQuestLog(status.activityFeed);
      renderTome(posts);

    } catch (e) {
      console.warn("Fetch error:", e.message);
    }
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
